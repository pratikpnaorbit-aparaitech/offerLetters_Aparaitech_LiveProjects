<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Aparaitech HR Portal</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:linear-gradient(135deg,#0d2b5e 0%,#1a4a8a 40%,#00aec7 100%);min-height:100vh;font-family:'Segoe UI',Arial,sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);width:100%;max-width:420px;overflow:hidden}
  .header{background:linear-gradient(135deg,#0d2b5e,#00aec7);padding:32px;text-align:center}
  .header img{height:64px;margin-bottom:12px}
  .header h1{color:#fff;font-size:20px;font-weight:700;letter-spacing:.5px}
  .header p{color:rgba(255,255,255,.75);font-size:12px;margin-top:4px}
  .body{padding:36px 32px}
  .field{margin-bottom:20px}
  label{display:block;font-size:11px;font-weight:700;color:#0d2b5e;text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
  input{width:100%;padding:12px 14px;border:1.5px solid #dde3f0;border-radius:8px;font-size:14px;color:#222;outline:none;transition:.2s}
  input:focus{border-color:#00aec7;box-shadow:0 0 0 3px rgba(0,174,199,.12)}
  .btn{width:100%;padding:14px;background:linear-gradient(135deg,#0d2b5e,#00aec7);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.5px;margin-top:4px;transition:.2s}
  .btn:hover{opacity:.9;transform:translateY(-1px)}
  .error{background:#fdecea;color:#c0392b;border:1px solid #f5b7b1;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:18px;text-align:center}
  .lock{font-size:36px;margin-bottom:8px}
  .footer{text-align:center;font-size:11px;color:#aaa;padding:0 32px 24px}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <img src="/static/logo.png" alt="Aparaitech" onerror="this.style.display='none'">
    <h1>HR Portal Login</h1>
    <p>Aparaitech Software Company</p>
  </div>
  <div class="body">
    {% if error %}
    <div class="error">⚠️ {{ error }}</div>
    {% endif %}
    <form method="POST" action="/login">
      <div class="field">
        <label>Username</label>
        <input type="text" name="uid" placeholder="Enter username" required autofocus autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required autocomplete="current-password">
      </div>
      <button class="btn" type="submit">🔐 Sign In</button>
    </form>
  </div>
  <div class="footer">Protected Portal &nbsp;·&nbsp; Aparaitech Software Company &nbsp;·&nbsp; Baramati, Pune</div>
</div>
</body>
</html>
